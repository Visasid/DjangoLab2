<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="{{ STATIC_URL }}/static/register.css">
        <title>Django аккаунт</title>
    </head>
    <body>
        <div class="content">
            <h1>Вход в аккаунт</h1>
            <form method="POST">{% csrf_token %}
                <input type="text" name="name" placeholder="Имя пользователя" value="{{ form.title }}">
                <input type="password" name="password" placeholder="Пароль" value="{{ form.title }}">
                <p><input type="submit" value="Войти"></p>
            </form>
            {{ form.errors }}
        </div>
    </body>
</html>
